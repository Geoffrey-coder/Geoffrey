<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="个人博客、日记、资源与计划。" />
    <title>个人博客</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github.min.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-theme="petit">
    <header class="topbar">
      <a class="brand" href="#/" id="site-title">个人博客</a>
      <nav class="main-nav" aria-label="主导航">
        <a href="#/" data-nav="/">首页</a>
        <a href="#/blog" data-nav="/blog">博客</a>
        <a href="#/diary" data-nav="/diary">日记</a>
        <a href="#/resources" data-nav="/resources">资源</a>
        <a href="#/plans" data-nav="/plans">计划</a>
      </nav>
      <form class="top-search" id="top-search" role="search">
        <i data-lucide="search" aria-hidden="true"></i>
        <input id="search-input" type="search" placeholder="搜索文章" autocomplete="off" />
      </form>
    </header>

    <main id="app" class="app-shell" tabindex="-1">
      <section class="loading-panel">
        <div class="loading-mark"></div>
        <p>正在载入站点数据</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
